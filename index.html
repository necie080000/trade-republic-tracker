<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Portfolio Trade Republic</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Lato', sans-serif;
            background-color: #f5f0e8;
            color: #3b2f2f;
            padding: 40px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #3b2f2f;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #9e8272;
            margin-bottom: 40px;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: #fff9f2;
            border: 1px solid #e0d5c5;
            border-radius: 4px;
            padding: 25px;
            text-align: center;
        }

        .card-label {
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #9e8272;
            margin-bottom: 10px;
        }

        .card-value {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #3b2f2f;
        }

        .card-value.gain { color: #8a7240; }
        .card-value.perte { color: #a05050; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff9f2;
            border: 1px solid #e0d5c5;
            border-radius: 4px;
            overflow: hidden;
        }

        thead {
            background: #4a3728;
            color: #f5f0e8;
        }

        th {
            padding: 15px;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 400;
        }

        td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #e0d5c5;
            font-size: 0.9rem;
            color: #3b2f2f;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f0e8d8; }

        .gain { color: #8a7240; font-weight: 700; }
        .perte { color: #a05050; font-weight: 700; }

        .btn-add {
            display: block;
            margin: 30px auto 0;
            padding: 14px 40px;
            background: #4a3728;
            color: #f5f0e8;
            border: none;
            font-family: 'Lato', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 2px;
        }

        .btn-add:hover { background: #8a7240; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(59,47,47,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: #fff9f2;
            border: 1px solid #e0d5c5;
            padding: 40px;
            width: 400px;
            border-radius: 4px;
        }

        .modal-content h2 {
            font-family: 'Playfair Display', serif;
            color: #3b2f2f;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #9e8272;
            margin-bottom: 8px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            background: #f5f0e8;
            border: 1px solid #e0d5c5;
            color: #3b2f2f;
            font-family: 'Lato', sans-serif;
            font-size: 0.9rem;
            border-radius: 2px;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-confirm {
            flex: 1;
            padding: 12px;
            background: #4a3728;
            color: #f5f0e8;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 2px;
        }

        .btn-cancel {
            flex: 1;
            padding: 12px;
            background: transparent;
            color: #9e8272;
            border: 1px solid #e0d5c5;
            cursor: pointer;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 2px;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #c0a080;
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .btn-delete:hover { color: #a05050; }
    </style>
</head>
<body>

    <h1>Portfolio</h1>
    <p class="subtitle">Trade Republic — Suivi d'investissements</p>

    <div class="cards-container">
        <div class="card">
            <div class="card-label">Investi total</div>
            <div class="card-value" id="totalInvesti">0,00 €</div>
        </div>
        <div class="card">
            <div class="card-label">Valeur actuelle</div>
            <div class="card-value" id="totalActuel">0,00 €</div>
        </div>
        <div class="card">
            <div class="card-label">Performance</div>
            <div class="card-value" id="totalPerf">0,00 €</div>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Actif</th>
                <th>Type</th>
                <th>Investi</th>
                <th>Valeur actuelle</th>
                <th>+/- Value</th>
                <th>Performance</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tableau"></tbody>
    </table>

    <button class="btn-add" onclick="ouvrirModal()">+ Ajouter un actif</button>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>Nouvel actif</h2>
            <div class="form-group">
                <label>Nom de l'actif</label>
                <input type="text" id="nom" placeholder="Ex: Apple, Bitcoin...">
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="type">
                    <option>Action</option>
                    <option>ETF</option>
                    <option>Crypto</option>
                    <option>Obligation</option>
                </select>
            </div>
            <div class="form-group">
                <label>Montant investi (€)</label>
                <input type="number" id="investi" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Valeur actuelle (€)</label>
                <input type="number" id="actuel" placeholder="0.00">
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="fermerModal()">Annuler</button>
                <button class="btn-confirm" onclick="ajouterActif()">Ajouter</button>
            </div>
        </div>
    </div>

    <script>
        let actifs = JSON.parse(localStorage.getItem('portfolio')) || [];

        function sauvegarder() {
            localStorage.setItem('portfolio', JSON.stringify(actifs));
        }

        function formaterEuro(n) {
            return n.toFixed(2).replace('.', ',') + ' €';
        }

        function afficher() {
            const tbody = document.getElementById('tableau');
            tbody.innerHTML = '';

            let totalInvesti = 0, totalActuel = 0;

            actifs.forEach((a, i) => {
                const diff = a.actuel - a.investi;
                const perf = a.investi > 0 ? (diff / a.investi * 100) : 0;
                const classe = diff >= 0 ? 'gain' : 'perte';
                const signe = diff >= 0 ? '+' : '';

                totalInvesti += a.investi;
                totalActuel += a.actuel;

                tbody.innerHTML += `
                    <tr>
                        <td><strong>${a.nom}</strong></td>
                        <td>${a.type}</td>
                        <td>${formaterEuro(a.investi)}</td>
                        <td>${formaterEuro(a.actuel)}</td>
                        <td class="${classe}">${signe}${formaterEuro(diff)}</td>
                        <td class="${classe}">${signe}${perf.toFixed(2)}%</td>
                        <td><button class="btn-delete" onclick="supprimer(${i})">✕</button></td>
                    </tr>`;
            });

            const diffTotal = totalActuel - totalInvesti;
            const classeTotal = diffTotal >= 0 ? 'gain' : 'perte';
            const signeTotal = diffTotal >= 0 ? '+' : '';

            document.getElementById('totalInvesti').textContent = formaterEuro(totalInvesti);
            document.getElementById('totalActuel').textContent = formaterEuro(totalActuel);
            const perfEl = document.getElementById('totalPerf');
            perfEl.textContent = signeTotal + formaterEuro(diffTotal);
            perfEl.className = 'card-value ' + classeTotal;
        }

        function ouvrirModal() {
            document.getElementById('modal').classList.add('active');
        }

        function fermerModal() {
            document.getElementById('modal').classList.remove('active');
            document.getElementById('nom').value = '';
            document.getElementById('investi').value = '';
            document.getElementById('actuel').value = '';
        }

        function ajouterActif() {
            const nom = document.getElementById('nom').value.trim();
            const type = document.getElementById('type').value;
            const investi = parseFloat(document.getElementById('investi').value);
            const actuel = parseFloat(document.getElementById('actuel').value);

            if (!nom || isNaN(investi) || isNaN(actuel)) {
                alert('Veuillez remplir tous les champs.');
                return;
            }

            actifs.push({ nom, type, investi, actuel });
            sauvegarder();
            afficher();
            fermerModal();
        }

        function supprimer(i) {
            actifs.splice(i, 1);
            sauvegarder();
            afficher();
        }

        afficher();
    </script>
</body>
</html>
